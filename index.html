<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --accent: #7c6af7;
      --accent2: #f76a8a;
      --text: #e8e8f0;
      --muted: #6b6b7e;
      --border: #2e2e3e;
      --green: #4ade80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .app { width: 100%; max-width: 500px; }

    .header { margin-bottom: 32px; }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #7c6af7, #f76a8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p { color: var(--muted); font-size: 14px; margin-top: 6px; }

    .stats { display: flex; gap: 12px; margin-bottom: 24px; }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      flex: 1;
      text-align: center;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-num.done { color: var(--green); }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .input-area { display: flex; gap: 10px; margin-bottom: 24px; }

    .input-area input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input::placeholder { color: var(--muted); }
    .input-area input:focus { border-color: var(--accent); }

    .add-btn {
      background: linear-gradient(135deg, #7c6af7, #f76a8a);
      border: none;
      border-radius: 12px;
      width: 50px;
      height: 50px;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }

    .add-btn:hover { opacity: 0.9; transform: scale(1.05); }
    .add-btn:active { transform: scale(0.95); }

    .filters { display: flex; gap: 8px; margin-bottom: 20px; }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .todo-list { display: flex; flex-direction: column; gap: 10px; }

    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.25s ease;
      transition: border-color 0.2s, opacity 0.2s;
    }

    .todo-item:hover { border-color: var(--accent); }
    .todo-item.completed { opacity: 0.5; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 12px;
      color: transparent;
    }

    .todo-item.completed .check-btn { background: var(--green); border-color: var(--green); color: #fff; }

    .todo-text { flex: 1; font-size: 15px; color: var(--text); transition: all 0.2s; }
    .todo-item.completed .todo-text { text-decoration: line-through; color: var(--muted); }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { color: var(--accent2); background: rgba(247,106,138,0.1); }

    .empty { text-align: center; padding: 48px 0; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>My Tasks</h1>
      <p>Stay focused, get things done.</p>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="total-count">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="pending-count">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat">
        <div class="stat-num done" id="done-count">0</div>
        <div class="stat-label">Done</div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="task-input" placeholder="Add a new task..." maxlength="80"/>
      <button class="add-btn" onclick="addTask()">+</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
    </div>

    <div class="todo-list" id="todo-list"></div>

    <button class="clear-btn" onclick="clearCompleted()">Clear completed tasks</button>
  </div>

  <script>
    let tasks = [];
    let filter = 'all';

    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now(), text, completed: false });
      input.value = '';
      render();
    }

    function toggleTask(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function clearCompleted() {
      tasks = tasks.filter(t => !t.completed);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('todo-list');
      const total = tasks.length;
      const done = tasks.filter(t => t.completed).length;
      const pending = total - done;

      document.getElementById('total-count').textContent = total;
      document.getElementById('done-count').textContent = done;
      document.getElementById('pending-count').textContent = pending;

      const filtered = tasks.filter(t => {
        if (filter === 'active') return !t.completed;
        if (filter === 'completed') return t.completed;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">✨</div><p>No tasks here!</p></div>`;
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="todo-item ${t.completed ? 'completed' : ''}">
          <button class="check-btn" onclick="toggleTask(${t.id})">✓</button>
          <span class="todo-text">${t.text}</span>
          <button class="delete-btn" onclick="deleteTask(${t.id})">×</button>
        </div>
      `).join('');
    }

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
